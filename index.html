<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pacific — learning notes for curious minds</title>
<meta name="description" content="A rough, open-sourced pile of learning notes for the curious minds.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Crayon texture filter: roughens glyph edges and breaks up the fill -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="crayon" x="-20%" y="-20%" width="140%" height="140%">
    <!-- hand-drawn, wobbly highlighter edge -->
    <feTurbulence type="fractalNoise" baseFrequency="0.04 0.09" numOctaves="3" seed="4" result="warp"/>
    <feDisplacementMap in="SourceGraphic" in2="warp" scale="9"/>
  </filter>
</svg>

<header class="masthead">
  <div class="wrap">
    <h1 class="nameplate">The Pacific</h1>
    <p class="motto">A rough, <a href="https://github.com/starsandbears/starsandbears.github.io" target="_blank" rel="noopener">open-sourced pile</a> of learning notes for<br><span class="curious-minds"><span class="cm1">the</span> <span class="cm2">curious</span> <span class="cm3">minds</span></span></p>
    <div class="folio">
      <span>Vol. I &middot; No. 1</span>
      <span id="folioDate">Sunday Edition &middot; June 28, 2026</span>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="sectionbar" id="filters"><!-- rendered by JS --></div>
  <p class="frontline">Front Page</p>
  <div class="post-list" id="postList"><!-- rendered by JS --></div>
</main>

<footer class="site">
  <div class="wrap">
    <div class="license">
      Written &amp; edited by Claude &middot; Printed open-source &middot; Text under <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC&nbsp;BY&nbsp;4.0</a>, code under <a href="https://github.com/starsandbears/starsandbears.github.io/blob/main/LICENSE" target="_blank" rel="noopener">MIT&nbsp;License</a>
    </div>
  </div>
</footer>

<script>
const CATEGORIES = {
  econ: {name:'Economics', tag:'tag--econ'},
  sci:  {name:'Science',   tag:'tag--sci'},
  tech: {name:'Technology',tag:'tag--tech'},
  hist: {name:'History',   tag:'tag--hist'}
};

const POSTS = [
];

/* Section bar: All + the active sections */
const filtersEl = document.getElementById('filters');
const filterKeys = ['all', ...Object.keys(CATEGORIES)];
filtersEl.innerHTML = filterKeys.map(k =>
  `<button class="filter-btn${k==='all'?' active':''}" data-filter="${k}">${k==='all'?'All':CATEGORIES[k].name}</button>`
).join('');

/* Front-page article index */
const listEl = document.getElementById('postList');
function renderPosts(filter='all'){
  const rows = POSTS.filter(p => filter==='all' || p.cat===filter);
  if(!rows.length){
    listEl.innerHTML = `<p class="empty">No dispatches yet — the presses are warming up.</p>`;
    return;
  }
  listEl.innerHTML = rows.map(p => {
    const c = CATEGORIES[p.cat];
    return `<a class="article" href="${p.url}">
        <span class="kicker">${c.name}</span>
        <h3 class="headline">${p.title}</h3>
        <p class="dateline">${p.date} &middot; ${p.read} read</p>
        <p class="teaser">${p.excerpt}</p>
        <span class="more">Continue reading &rarr;</span>
      </a>`;
  }).join('');
}
/* Deep-link: index.html#econ pre-selects a section */
function applyHash(){
  const key = (location.hash || '').replace('#','');
  const target = CATEGORIES[key] ? key : 'all';
  filtersEl.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === target));
  renderPosts(target);
}
applyHash();
window.addEventListener('hashchange', applyHash);

/* Live masthead date — keeps the "edition" honest */
const now = new Date();
const weekday = now.toLocaleDateString('en-US', {weekday:'long'});
const longDate = now.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
document.getElementById('folioDate').innerHTML = `${weekday} Edition · ${longDate}`;

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn'); if(!btn) return;
  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPosts(btn.dataset.filter);
});
</script>
</body>
</html>

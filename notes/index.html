<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BCI Knowledge Vault</title>
<link rel="preconnect" href="https://unpkg.com" />
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
<style>
  :root {
    --bg: #02040a;
    --panel: #0b0f17;
    --border: #1c2433;
    --text: #e6edf3;
    --muted: #7d8694;
    --accent: #8ab4ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  #app { display: grid; grid-template-columns: minmax(0, 1fr) 420px; height: 100vh; }
  #graph {
    position: relative;
    min-width: 0;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #050a14 0%, #02040a 80%);
  }
  #graph canvas { display: block; }
  #panel {
    background: var(--panel); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 24px 28px;
  }
  header {
    position: absolute; top: 16px; left: 20px; z-index: 10;
    display: flex; gap: 12px; align-items: baseline;
    pointer-events: none;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: .02em; }
  header span { color: var(--muted); font-size: 12px; }
  #controls {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 10;
    display: flex; gap: 10px; align-items: center;
    background: rgba(11,15,23,.92); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    backdrop-filter: blur(6px);
    max-width: calc(100% - 520px);
    flex-wrap: wrap;
  }
  #controls input[type="search"] {
    background: #02040a; border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 5px; font-size: 12px; width: 160px;
    outline: none;
  }
  #controls input[type="search"]:focus { border-color: var(--accent); }
  #controls .cats { display: flex; gap: 4px; flex-wrap: wrap; }
  #controls .cat-toggle {
    cursor: pointer; user-select: none;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 3px 9px; font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
    transition: all .15s ease;
  }
  #controls .cat-toggle .dot { width: 8px; height: 8px; border-radius: 50%; opacity: .4; }
  #controls .cat-toggle.on { color: var(--text); border-color: #3a4250; }
  #controls .cat-toggle.on .dot { opacity: 1; }
  #controls .tree-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); cursor: pointer; user-select: none;
    padding-left: 8px; border-left: 1px solid var(--border);
  }
  #controls .tree-toggle input { accent-color: var(--accent); }
  #legend {
    position: absolute; bottom: 16px; left: 20px; z-index: 10;
    background: rgba(11,15,23,.85); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; font-size: 12px;
  }
  #legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  #hint {
    position: absolute; bottom: 16px; right: 16px; z-index: 10;
    color: var(--muted); font-size: 11px; text-align: right;
    background: rgba(11,15,23,.6); padding: 6px 10px; border-radius: 5px;
    border: 1px solid var(--border);
    pointer-events: none;
  }
  /* 3d-force-graph injects its own tooltip; restyle it */
  .scene-tooltip {
    color: #f0f4fb !important;
    background: rgba(2,4,10,.92) !important;
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    padding: 5px 10px !important;
    font: 500 12px -apple-system, BlinkMacSystemFont, system-ui, sans-serif !important;
    box-shadow: 0 4px 16px rgba(0,0,0,.6);
  }
  .scene-tooltip .tip-cat {
    color: var(--muted); font-size: 10px; text-transform: uppercase;
    letter-spacing: .05em; margin-top: 2px; display: block;
  }
  #panel .placeholder { color: var(--muted); font-style: italic; margin-top: 40px; text-align: center; }
  #panel h1 { font-size: 22px; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  #panel h2 { font-size: 16px; margin-top: 24px; color: var(--accent); }
  #panel h3 { font-size: 14px; margin-top: 18px; }
  #panel a { color: var(--accent); text-decoration: none; }
  #panel a:hover { text-decoration: underline; }
  #panel code { background: #1f2630; padding: 1px 5px; border-radius: 3px; font-size: 12.5px; }
  #panel pre { background: #1f2630; padding: 12px; border-radius: 6px; overflow-x: auto; }
  #panel ul { padding-left: 22px; }
  .meta { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 16px; }
  .meta .pill {
    background: #1f2630; border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 999px; font-size: 11px;
    color: var(--muted);
  }
  .meta .pill.cat { color: var(--text); }
  .wikilink { background: #1f2630; padding: 1px 6px; border-radius: 3px; cursor: pointer; }
  .wikilink.broken { color: #f85149; }
</style>
</head>
<body>
<div id="app">
  <div id="graph"></div>
  <aside id="panel">
    <p class="placeholder">Click any star to read its wiki page.</p>
  </aside>
</div>
<header>
  <h1>BCI Knowledge Vault</h1>
  <span id="counts"></span>
</header>
<div id="controls">
  <input type="search" id="search" placeholder="Search concepts…" autocomplete="off" />
  <div class="cats" id="cat-toggles"></div>
  <label class="tree-toggle">
    <input type="checkbox" id="tree-only" />
    Tree only
  </label>
</div>
<div id="legend"></div>
<div id="hint">drag to orbit · scroll to zoom · click a star</div>

<script>
// Categories are verbs along the BCI pipeline, ordered along the visible
// light spectrum (red → violet) from input (sense) to output (apply).
const CATEGORY_ORDER = ["sense", "measure", "elicit", "denoise", "decode", "stimulate", "apply"];
const CATEGORY_COLORS = {
  sense:     "#ff4d8d", // pink    — acquire signals
  measure:   "#4ade80", // green   — observable brain phenomena
  elicit:    "#ff9a3c", // orange  — evoke target responses
  denoise:   "#ffd93d", // yellow  — clean signals
  decode:    "#14b8a6", // teal    — extract intent / sources
  stimulate: "#38bdf8", // blue    — modulate the brain
  apply:     "#a855f7", // violet  — end-user systems
};
const FALLBACK_COLOR = "#8ab4ff";

// Build a soft circular sprite texture so each node renders as a glowing star
// instead of a flat-shaded sphere.
function makeStarTexture(hexColor) {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  const cx = size / 2, cy = size / 2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cx);
  grad.addColorStop(0.00, "rgba(255,255,255,1)");
  grad.addColorStop(0.15, hexColor);
  grad.addColorStop(0.40, hexToRgba(hexColor, 0.55));
  grad.addColorStop(1.00, hexToRgba(hexColor, 0));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace || tex.colorSpace;
  return tex;
}

function hexToRgba(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

async function main() {
  const graph = await fetch("graph.json").then(r => r.json());
  document.getElementById("counts").textContent =
    `${graph.node_count} concepts · ${graph.edge_count} links`;

  // Sort categories along the visible-light spectrum
  graph.categories = [...graph.categories].sort((a, b) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  // Flatten Cytoscape-style {data: {...}} into the {nodes, links} 3d-force-graph expects
  const nodes = graph.nodes.map(n => ({ ...n.data }));
  const links = graph.edges.map(e => ({ ...e.data }));
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));
  const slugSet = new Set(nodes.map(n => n.id));

  // Build legend
  const legend = document.getElementById("legend");
  graph.categories.forEach(cat => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      `<span class="dot" style="background:${CATEGORY_COLORS[cat] || FALLBACK_COLOR}"></span>${cat}`;
    legend.appendChild(row);
  });

  // Build category toggles
  const filterState = {
    query: "",
    activeCategories: new Set(graph.categories),
    treeOnly: false,
  };
  const catContainer = document.getElementById("cat-toggles");
  graph.categories.forEach(cat => {
    const el = document.createElement("span");
    el.className = "cat-toggle on";
    el.dataset.cat = cat;
    el.innerHTML = `<span class="dot" style="background:${CATEGORY_COLORS[cat] || FALLBACK_COLOR}"></span>${cat}`;
    el.addEventListener("click", () => {
      if (filterState.activeCategories.has(cat)) {
        filterState.activeCategories.delete(cat);
        el.classList.remove("on");
      } else {
        filterState.activeCategories.add(cat);
        el.classList.add("on");
      }
      Graph.refresh();
    });
    catContainer.appendChild(el);
  });

  document.getElementById("search").addEventListener("input", e => {
    filterState.query = e.target.value.trim().toLowerCase();
    Graph.refresh();
  });

  document.getElementById("tree-only").addEventListener("change", e => {
    filterState.treeOnly = e.target.checked;
    Graph.refresh();
  });

  // Cache one star texture per category
  const textureCache = {};
  function getStarTexture(category) {
    if (!textureCache[category]) {
      textureCache[category] = makeStarTexture(CATEGORY_COLORS[category] || FALLBACK_COLOR);
    }
    return textureCache[category];
  }

  function nodeIsVisible(node) {
    if (!node) return false;
    const catOk = filterState.activeCategories.has(node.category);
    const q = filterState.query;
    const queryOk = !q
      || (node.label && node.label.toLowerCase().includes(q))
      || (node.id && node.id.toLowerCase().includes(q));
    return catOk && queryOk;
  }

  const graphEl = document.getElementById("graph");

  const Graph = ForceGraph3D()(graphEl)
    .graphData({ nodes, links })
    .backgroundColor("rgba(0,0,0,0)")
    .showNavInfo(false)
    .nodeId("id")
    .nodeLabel(n =>
      `<div>${escapeHtml(n.label)}<span class="tip-cat">${n.category}</span></div>`
    )
    .nodeThreeObject(n => {
      const group = new THREE.Group();

      // Visible glowing star
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: getStarTexture(n.category),
        color: 0xffffff,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      }));
      sprite.scale.set(14, 14, 1);
      group.add(sprite);

      // Invisible hit target. Sized to match the visible bright core, not
      // the full sprite glow — otherwise hit spheres of nearby nodes overlap
      // and the raycaster picks the wrong one.
      const hitMat = new THREE.MeshBasicMaterial({
        transparent: true, opacity: 0, depthWrite: false,
      });
      const hit = new THREE.Mesh(new THREE.SphereGeometry(3.5, 12, 12), hitMat);
      group.add(hit);

      return group;
    })
    .nodeVisibility(n => nodeIsVisible(n))
    .linkVisibility(l => {
      const src = typeof l.source === "object" ? l.source : nodeById[l.source];
      const tgt = typeof l.target === "object" ? l.target : nodeById[l.target];
      if (!nodeIsVisible(src) || !nodeIsVisible(tgt)) return false;
      if (filterState.treeOnly && l.type !== "parent") return false;
      return true;
    })
    .linkColor(l => l.type === "parent" ? "#8ab4ff" : "#4a5468")
    .linkOpacity(0.45)
    .linkWidth(l => l.type === "parent" ? 0.6 : 0.2)
    .linkDirectionalArrowLength(l => l.type === "parent" ? 3 : 0)
    .linkDirectionalArrowRelPos(0.92)
    .linkDirectionalArrowColor(() => "#8ab4ff")
    .linkCurvature(0.1)
    .d3VelocityDecay(0.45)
    .cooldownTime(3500)
    .enableNodeDrag(false)
    .onNodeClick(node => {
      // Fly the camera to the node
      const distance = 120;
      const dist = Math.hypot(node.x || 1, node.y || 1, node.z || 1);
      const ratio = 1 + distance / dist;
      Graph.cameraPosition(
        { x: node.x * ratio, y: node.y * ratio, z: node.z * ratio },
        node,
        1200
      );
      loadConcept(node);
    })
    .onNodeHover(node => {
      graphEl.style.cursor = node ? "pointer" : "grab";
    });

  // Spread the layout out — without enough repulsion, nodes drift close
  // enough that their hit-test spheres overlap and hovers/clicks pick the
  // wrong one.
  Graph.d3Force("charge").strength(-450);
  if (Graph.d3Force("link")) {
    Graph.d3Force("link").distance(80);
  }

  // Add a starfield background
  addStarfield(Graph.scene());

  // Resize handling so the canvas tracks the grid column
  function resize() {
    Graph.width(graphEl.clientWidth).height(graphEl.clientHeight);
  }
  resize();
  window.addEventListener("resize", resize);

  function addStarfield(scene) {
    const STAR_COUNT = 1500;
    const positions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
      // Distribute on a large sphere shell so the camera always sees stars
      const r = 1500 + Math.random() * 800;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 1.6,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.7,
      depthWrite: false,
    });
    const stars = new THREE.Points(geom, mat);
    scene.add(stars);
  }

  // ---------- Side panel rendering ----------

  async function loadConcept(node) {
    const panel = document.getElementById("panel");
    panel.innerHTML = `<p class="placeholder">Loading ${escapeHtml(node.label)}…</p>`;
    try {
      const text = await fetch(node.file).then(r => r.text());
      const { meta, body } = splitFrontmatter(text);
      const html = marked.parse(rewriteWikilinks(body));
      panel.innerHTML = `
        <h1>${escapeHtml(meta.title || node.label)}</h1>
        <div class="meta">
          <span class="pill cat" style="border-color:${CATEGORY_COLORS[node.category] || FALLBACK_COLOR}">${node.category}</span>
          <span class="pill">${node.level || ""}</span>
          <span class="pill">${node.status || ""}</span>
        </div>
        ${html}
      `;
      panel.querySelectorAll("a.wikilink").forEach(a => {
        a.addEventListener("click", e => {
          e.preventDefault();
          const slug = a.dataset.slug;
          const target = nodeById[slug];
          if (target) {
            const distance = 120;
            const dist = Math.hypot(target.x || 1, target.y || 1, target.z || 1);
            const ratio = 1 + distance / dist;
            Graph.cameraPosition(
              { x: target.x * ratio, y: target.y * ratio, z: target.z * ratio },
              target,
              1200
            );
            loadConcept(target);
          }
        });
      });
    } catch (err) {
      panel.innerHTML = `<p class="placeholder">Failed to load ${escapeHtml(node.file)}</p>`;
    }
  }

  function splitFrontmatter(text) {
    const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if (!m) return { meta: {}, body: text };
    const meta = {};
    m[1].split("\n").forEach(line => {
      const mm = line.match(/^([a-zA-Z_]+):\s*(.*)$/);
      if (mm) meta[mm[1]] = mm[2].replace(/^['"]|['"]$/g, "");
    });
    return { meta, body: m[2] };
  }

  function rewriteWikilinks(md) {
    return md.replace(/\[\[([^\]|#]+)(?:[#|]([^\]]*))?\]\]/g, (_, target, alias) => {
      const slug = target.trim();
      const label = (alias || slug).trim();
      const broken = slugSet.has(slug) ? "" : " broken";
      return `<a href="#" class="wikilink${broken}" data-slug="${slug}">${label}</a>`;
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

main();
</script>
</body>
</html>
